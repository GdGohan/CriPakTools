name: Compilar CriPakTools Corrigido

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar o código-fonte
      uses: actions/checkout@v4

    - name: Configurar o MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Forçar Atualização do Framework e Corrigir Bug
      shell: powershell
      run: |
        # 1. Localizar e atualizar o arquivo .csproj usando substituição de texto direta
        $csprojPath = "CriPakTools/CriPakTools.csproj"
        if (-not (Test-Path $csprojPath)) { $csprojPath = "CriPakTools.csproj" }
        
        if (Test-Path $csprojPath) {
            $text = Get-Content $csprojPath -Raw
            
            # Substituição bruta das tags de versão e perfil
            $text = $text -replace '<TargetFrameworkVersion>v4.0</TargetFrameworkVersion>', '<TargetFrameworkVersion>v4.8</TargetFrameworkVersion>'
            $text = $text -replace '<TargetFrameworkProfile>Client</TargetFrameworkProfile>', ''
            
            Set-Content $csprojPath $text -NoNewline
            Write-Host "Texto do .csproj alterado para v4.8!"
        }

    - name: Compilar o Executável
      run: msbuild CriPakTools.sln /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.8
