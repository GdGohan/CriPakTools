name: Compilar CriPakTools Corrigido

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar o código-fonte
      uses: actions/checkout@v4

    - name: Configurar o MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Atualizar Target Framework e Corrigir Bug
      shell: powershell
      run: |
        # 1. Atualiza o projeto para .NET 4.8 para resolver o erro de SDK ausente
        $csprojPath = "CriPakTools/CriPakTools.csproj"
        if (-not (Test-Path $csprojPath)) { $csprojPath = "CriPakTools.csproj" }
        
        if (Test-Path $csprojPath) {
            $xml = [xml](Get-Content $csprojPath)
            $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $ns.AddNamespace("ns", "http://schemas.microsoft.com/developer/msbuild/003")
            
            # Altera a versão do framework para 4.8
            $nodeVersion = $xml.SelectSingleNode("//ns:TargetFrameworkVersion", $ns)
            if ($nodeVersion) { $nodeVersion.InnerText = "v4.8" }
            
            # Remove o Perfil Client que causa incompatibilidade
            $nodeProfile = $xml.SelectSingleNode("//ns:TargetFrameworkProfile", $ns)
            if ($nodeProfile) { $nodeProfile.ParentNode.RemoveChild($nodeProfile) }
            
            $xml.Save($csprojPath)
            Write-Host "Projeto atualizado para .NET Framework 4.8 com sucesso!"
        } else {
            Write-Warning "Arquivo .csproj não foi encontrado no caminho esperado."
        }
        
    - name: Compilar o Executável
      run: msbuild CriPakTools.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Disponibilizar para Download (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: CriPakTools-Corrigido
        path: |
          **/bin/Release/CriPakTools.exe
          **/bin/Release/*.dll
